name: technology_config
description: This hybrid plant stores and discharges electricity
technologies:
  battery:
    dispatch_rule_set:
      model: PyomoRuleStorageBaseclass
    performance_model:
      model: PySAMBatteryPerformanceModel
    cost_model:
      model: PySAMBatteryPerformanceModel
    model_inputs:
      shared_parameters:
        max_charge_rate: 50000
        max_capacity: 200000
        dt: 1.0
        n_timesteps: 24
        init_soc_fraction: 0.5
        max_soc_fraction: 0.9
        min_soc_fraction: 0.1
      performance_parameters:
        chemistry: LFPGraphite
        demand_profile: 0.0
      dispatch_rule_parameters:
        commodity_name: electricity
        commodity_storage_units: kW
      control_parameters:
        n_control_window_hours: 24
