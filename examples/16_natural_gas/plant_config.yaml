name: plant_config
description: This plant is located in Texas
sites:
  site:
    latitude: 32.34
    longitude: -98.27
    resources:
      solar_resource:
        resource_model: GOESAggregatedSolarAPI
        resource_parameters:
          resource_year: 2013
          resource_dir: ../11_hybrid_energy_plant/tech_inputs/weather/solar
          resource_filename: 30.6617_-101.7096_psmv3_60_2013.csv
# array of arrays containing left-to-right technology
# interconnections; can support bidirectional connections
# with the reverse definition.
# in this example the natural gas combined cycle plant is behind-the-meter
# and not connected to additional technologies.
# hence the empty array.
technology_interconnections:
  # connect solar to battery
  - [solar, battery, electricity, cable]
  # combine the battery output with the solar generation
  - [battery, elec_combiner, electricity, cable]
  - [solar, elec_combiner, electricity, cable]
  # subtract the combined generation from the demand profile
  - [elec_combiner, electrical_load_demand, electricity, cable]
  # connect the remaining electricity demand to the NG plant
  - [electrical_load_demand, natural_gas_plant, [unmet_electricity_demand_out, electricity_set_point]]
  # connect NG feedstock to NG plant
  - [ng_feedstock, natural_gas_plant, natural_gas, pipe]
  # connect natural gas and solar to finance combiner
  - [solar, fin_combiner, electricity, cable]
  - [natural_gas_plant, fin_combiner, electricity, cable]
resource_to_tech_connections:
  # connect the wind resource to the wind technology
  - [site.solar_resource, solar, solar_resource_data]
plant:
  plant_life: 30
  simulation:
    n_timesteps: 8760
finance_parameters:
  finance_groups:
    profast_model:
      commodity: electricity
      finance_model: ProFastLCO
      model_inputs:
        params:
          analysis_start_year: 2032
          installation_time: 36
          inflation_rate: 0.0
          discount_rate: 0.09
          debt_equity_ratio: 2.62
          property_tax_and_insurance: 0.03
          total_income_tax_rate: 0.308
          capital_gains_tax_rate: 0.15
          sales_tax_rate: 0.07375
          debt_interest_rate: 0.07
          debt_type: Revolving debt
          loan_period_if_used: 0
          cash_onhand_months: 1
          admin_expense: 0.00
        capital_items:
          depr_type: MACRS
          depr_period: 5
          refurb: [0.]
  cost_adjustment_parameters:
    cost_year_adjustment_inflation: 0.025
    target_dollar_year: 2022
  finance_subgroups:
    renewables:
      commodity: electricity
      commodity_stream: solar
      finance_groups: [profast_model]
      technologies: [solar, battery]
    natural_gas:
      commodity: electricity
      commmodity_stream: natural_gas_plant
      finance_groups: [profast_model]
      technologies: [natural_gas_plant, ng_feedstock]
    electricity:
      commodity: electricity
      commodity_stream: fin_combiner
      finance_groups: [profast_model]
      technologies: [solar, battery, natural_gas_plant, ng_feedstock]
