name: technology_config
description: This plant produces electricity from natural gas using a combined cycle turbine
technologies:
  solar:
    performance_model:
      model: PYSAMSolarPlantPerformanceModel
    cost_model:
      model: ATBUtilityPVCostModel
    model_inputs:
      performance_parameters:
        pv_capacity_kWdc: 200000  # 200 MWdc
        dc_ac_ratio: 1.34
        create_model_from: new
        tilt_angle_func: none
        tilt: 0
        pysam_options:
          SystemDesign:
            gcr: 0.3
            array_type: 2
            bifaciality: 0.65
            inv_eff: 96.0
            losses: 14.6
            module_type: 1
            azimuth: 180
            rotlim: 45
          SolarResource:
            albedo_default: 0.2
      cost_parameters:
        capex_per_kWac: 1193
        opex_per_kWac_per_year: 18
        cost_year: 2024
  battery:
    performance_model:
      model: StoragePerformanceModel
    cost_model:
      model: ATBBatteryCostModel
    control_strategy:
      model: DemandOpenLoopStorageController
    model_inputs:
      shared_parameters:
        commodity: electricity
        commodity_rate_units: kW
        max_charge_rate: 25000.0  # kW/time step, 25 MW
        max_capacity: 200000.0  # kWh, 200 MWh
        max_soc_fraction: 1.0  # fraction (0-1)
        min_soc_fraction: 0.1  # fraction (0-1)
        init_soc_fraction: 0.1  # fraction (0-1)
        max_discharge_rate: 25000.0  # kW/time step
        charge_efficiency: 1.0  # fraction (0-1)
        discharge_efficiency: 1.0  # fraction (0-1)
        demand_profile: 100000  # kW, 100 MW
      cost_parameters:
        cost_year: 2022
        energy_capex: 300  # $/kWh
        power_capex: 100  # $/kW
        opex_fraction: 0.05  # percent of capex
  elec_combiner:
    performance_model:
      model: GenericCombinerPerformanceModel
    model_inputs:
      performance_parameters:
        commodity: electricity
        commodity_rate_units: kW
  electrical_load_demand:
    performance_model:
      model: GenericDemandComponent
    model_inputs:
      performance_parameters:
        commodity: electricity
        commodity_rate_units: kW
        demand_profile: 100000  # kW, 100 MW
  ng_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: natural_gas
        commodity_rate_units: MMBtu/h
      performance_parameters:
        rated_capacity: 750.  # MMBtu/h
      cost_parameters:
        cost_year: 2023
        commodity_amount_units: MMBtu
        price: 4.2  # USD/commodity_amount_units
        annual_cost: 0.  # USD
        start_up_cost: 100000.  # USD
  natural_gas_plant:
    performance_model:
      model: NaturalGasPerformanceModel
    cost_model:
      model: NaturalGasCostModel
    model_inputs:
      shared_parameters:
        heat_rate_mmbtu_per_mwh: 7.5  # MMBtu/MWh - typical for NGCC
        system_capacity_mw: 100.
      cost_parameters:
        capex_per_kw: 1000  # $/kW - typical for NGCC
        fixed_opex_per_kw_per_year: 10.0  # $/kW/year
        variable_opex_per_mwh: 2.5  # $/MWh
        cost_year: 2023
  fin_combiner:
    performance_model:
      model: GenericCombinerPerformanceModel
    model_inputs:
      performance_parameters:
        commodity: electricity
        commodity_rate_units: kW
