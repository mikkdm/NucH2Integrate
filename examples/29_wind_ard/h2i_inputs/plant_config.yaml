name: plant_config
description: This plant is located in Denmark. The plant combines wind and solar generation with a battery to meet a constant
  load
sites:
  site:
    latitude: 56.22732285
    longitude: 8.594398
    resources:
      # wind resource is handled directly in the Ard wrapper
      solar_resource:
        resource_model: OpenMeteoHistoricalSolarResource
        resource_parameters:
          resource_year: 2023
          resource_filename: 56.22732285_8.594398_2023_openmeteo_archive_solar_60min_utc_tz.csv
plant:
  plant_life: 30
technology_interconnections:
  - [wind, combiner, electricity, cable]
  - [solar, combiner, electricity, cable]
  - [combiner, battery, electricity, cable]
  # combine the electricity from wind, solar, and the battery
  - [combiner, elec_combiner, electricity, cable]
  - [battery, elec_combiner, electricity, cable]
  # subtract electricity production from electricity demand
  - [elec_combiner, electrical_load_demand, electricity, cable]
  # etc
resource_to_tech_connections:
  # The wind resource is handled strictly by Ard in this example,
  # so only the solar resource connection is included here
  - [site.solar_resource, solar, solar_resource_data]
finance_parameters:
  finance_groups:
    finance_model: ProFastLCO
    model_inputs:
      params:
        analysis_start_year: 2025
        installation_time: 36  # months
        inflation_rate: 0.0  # 0 for real analysis
        discount_rate: 0.09  # nominal return based on 2024 ATB baseline workbook for land-based wind
        debt_equity_ratio: 2.62  # 2024 ATB uses 72.4% debt for land-based wind
        property_tax_and_insurance: 0.03  # percent of CAPEX estimated based on https://www.nlr.gov/docs/fy25osti/91775.pdf  https://www.house.mn.gov/hrd/issinfo/clsrates.aspx
        total_income_tax_rate: 0.257  # 0.257 tax rate in 2024 atb baseline workbook, value here is based on federal (21%) and state in MN (9.8)
        capital_gains_tax_rate: 0.15  # H2FAST default
        sales_tax_rate: 0.07375  # total state and local sales tax in St. Louis County https://taxmaps.state.mn.us/salestax/
        debt_interest_rate: 0.07  # based on 2024 ATB nominal interest rate for land-based wind
        debt_type: Revolving debt  # can be "Revolving debt" or "One time loan". Revolving debt is H2FAST default and leads to much lower LCOH
        loan_period_if_used: 0  # H2FAST default, not used for revolving debt
        cash_onhand_months: 1  # H2FAST default
        admin_expense: 0.00  # percent of sales H2FAST default
      capital_items:
        depr_type: MACRS   # can be "MACRS" or "Straight line"
        depr_period: 5  # 5  years - for clean energy facilities as specified by the IRS MACRS schedule https://www.irs.gov/publications/p946#en_US_2020_publink1000107507
        refurb: [0.]
  cost_adjustment_parameters:
    cost_year_adjustment_inflation: 0.025  # used to adjust modeled costs to target_dollar_year
    target_dollar_year: 2025
  finance_subgroups:
    dispatched_electricity:
      commodity: electricity
      commodity_stream: electrical_load_demand
      technologies: [wind, solar, battery]
    produced_electricity:
      commodity: electricity
      commodity_stream: combiner
      technologies: [wind, solar]
