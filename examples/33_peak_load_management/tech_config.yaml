name: technology_config
description: This plant charges a battery from the grid to reduce peak demand
technologies:
  battery:
    performance_model:
      model: StoragePerformanceModel
    cost_model:
      model: ATBBatteryCostModel
    control_strategy:
      model: PeakLoadManagementHeuristicOpenLoopStorageController
    model_inputs:
      shared_parameters:
        commodity: electricity
        commodity_rate_units: kW
        max_charge_rate: 300.0  # kW
        max_discharge_rate: 300.0  # kW. Defaults to battery power limit when matched to max_charge_rate
        charge_equals_discharge: true  # enforce symmetric charge and discharge power limits
        max_capacity: 1200.0  # kWh, 1 MWh
        max_soc_fraction: 0.9  # percent as decimal
        min_soc_fraction: 0.1  # percent as decimal
        init_soc_fraction: 0.9  # percent as decimal
        charge_efficiency: 1.0  # percent as decimal
        discharge_efficiency: 1.0  # percent as decimal
        demand_profile: !include demand_profiles/demand_profile.yaml
      control_parameters:
        demand_profile_upstream: !include demand_profiles/demand_profile_upstream.yaml  # demand used to define when the supervisor commands battery dispatch. This may represent an upstream load.
        dispatch_priority_demand_profile: demand_profile_upstream  # demand profile the controller prioritizes when deciding dispatch
        n_override_events: 3  # maximum number of peak events from the priority demand profile that the controller will respond to within each event period
        override_events_period: W  # pandas-style period code for resetting event counts; W means per week, M means month, etc
        peak_range:
          start: 12:00:00  # start of the preferred daily peak-shaving window
          end: 19:00:00  # end of the preferred daily peak-shaving window
        advance_discharge_period:
          units: h  # time units applied to the advance-discharge offset
          val: 1  # begin discharging this far ahead of the detected peak
        delay_charge_period:
          units: h  # time units applied to the charge-delay offset
          val: 4  # wait this long after the peak window before recharging
        allow_charge_in_peak_range: false  # if false, charging is blocked during the peak window
        min_peak_proximity:
          units: h  # time units used for the minimum distance-to-peak threshold
          val: 4  # throws an error when the next peak is closer than this threshold
      cost_parameters:
        cost_year: 2024
        energy_capex: 408 # $/kWh  # conservative case for 2024 ATB utility scale batteries
        power_capex: 379 # $/kW  # conservative case for 2024 ATB utility scale batteries
        opex_fraction: 0.025  # 2.5% percent of capex as per 2024 ATB for utility scale batteries
  electrical_load_demand:
    performance_model:
      model: GenericDemandComponent
    model_inputs:
      performance_parameters:
        commodity: electricity
        commodity_rate_units: kW
        demand_profile: !include demand_profiles/demand_profile.yaml
  grid_buy:
    performance_model:
      model: GridPerformanceModel
    cost_model:
      model: GridCostModel
    model_inputs:
      shared_parameters:
        interconnection_size: 100000
      cost_parameters:
        cost_year: 2024
        fixed_interconnection_cost: 0.0
        interconnection_capex_per_kw: 0.0
        interconnection_opex_per_kw: 0.0
        electricity_buy_price: 0.09
