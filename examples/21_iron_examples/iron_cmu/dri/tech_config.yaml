        commodity_rate_units: t/h
  doloma_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: doloma
        commodity_rate_units: t/h
      performance_parameters:
        rated_capacity: 2.0  # t/h
