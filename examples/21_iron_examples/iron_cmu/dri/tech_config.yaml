      performance_parameters:
        rated_capacity: 2.0  # t/h
      cost_parameters:
        cost_year: 2022
        price: 120.00  # USD/t
        annual_cost: 0.
        start_up_cost: 0.
  lime_transport:
    performance_model:
      model: GenericTransporterPerformanceModel
    model_inputs:
      performance_parameters:
        commodity: lime
        commodity_rate_units: t/h
  steel_plant:
    performance_model:
      model: CMUElectricArcFurnaceDRIPerformanceComponent
    cost_model:
      model: CMUElectricArcFurnaceCostModel
    model_inputs:
      performance_parameters:
        steel_production_rate_tonnes_per_year: 2000000.0
        steel_percent_carbon: 0.001
        scrap_composition:
          Fe: 0.94
          SiO2: 0.01
        pellet_grade: BF
        DRI_feed_temp: hot
        energy_mass_balance_dict:
          natural_gas: 0.44  # MMBtu/ton steel
          electrodes: 2.00  # kg/ton steel
          slag_basicity: 1.50  # kg CaO / (kg SiO2 + kg Al2O3)
          mass_Al2O3_slag_per_tscrap: 0.0
          mass_Al2O3_slag_per_tLS: 0.0
          pct_MgO_slag: 0.12
          pct_FeO_slag: 0.30
          pct_carbon_steel_tap: 0.03
          CaO_MgO_ratio: 1.4  # 56/40
          electricity_kWh_per_tonne_steel: 470.0
          EAF_scrap_heat_loss_adjustment_abs: 170.05902581681391
      cost_parameters:
        cost_year: 2022
