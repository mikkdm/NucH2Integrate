name: technology_config
description: CMU decarbSTEEL EAF model with DRI and scrap feedstock
technologies:
  oxygen_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: oxygen
        commodity_rate_units: m**3/h
      performance_parameters:
        rated_capacity: 500000.0  # m**3/h
      cost_parameters:
        cost_year: 2022
        price: 0.15  # USD/m**3
        annual_cost: 0.
        start_up_cost: 0.
  oxygen_transport:
    performance_model:
