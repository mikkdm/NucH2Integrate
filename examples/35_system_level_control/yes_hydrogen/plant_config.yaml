name: plant_config
description: This plant is located in Texas, USA.
sites:
  site:
    latitude: 30.6617
    longitude: -101.7096
    resources:
      wind_resource:
        resource_model: WTKNLRDeveloperAPIWindResource
        resource_parameters:
          resource_year: 2013
# array of arrays containing left-to-right technology
# interconnections; can support bidirectional connections
# with the reverse definition.
# this will naturally grow as we mature the interconnected tech
technology_interconnections:
  - [ng_feedstock, natural_gas_plant, natural_gas, pipe]
  # connect NG feedstock to NG plant
  - [wind, battery, electricity, cable]
  # wind output available for battery charging (electricity_in)
  - [wind, elec_combiner, electricity, cable]
  # wind to combined output
  - [battery, elec_combiner, electricity, cable]
  # battery net output to combined output
  - [natural_gas_plant, elec_combiner, electricity, cable]
  # electricity to electrolyzer
  - [elec_combiner, electrolyzer, electricity, cable]
  # electrolyzer to storage
  - [electrolyzer, h2_storage, hydrogen, pipe]
  # combine hydrogen streams
  - [electrolyzer, h2_combiner, hydrogen, pipe]
  - [h2_storage, h2_combiner, hydrogen, pipe]
  # send hydrogen to load
  - [h2_combiner, h2_load_demand, hydrogen, pipe]
  # combined supply to demand
resource_to_tech_connections:
  # connect the wind resource to the wind technology
  - [site.wind_resource, wind, wind_resource_data]
plant:
  plant_life: 30
  simulation:
    n_timesteps: 8760
    dt: 3600
system_level_control:
  control_strategy: DemandFollowingControl
  solver_options:
    solver_name: gauss_seidel
    max_iter: 20
    convergence_tolerance: 1.0e-6
finance_parameters:
  finance_groups:
    profast_lco:
      finance_model: ProFastLCO
      model_inputs:
        params:
          analysis_start_year: 2032
          installation_time: 36  # months
          inflation_rate: 0.0  # 0 for nominal analysis
          discount_rate: 0.09  # nominal return based on 2024 ATB baseline workbook for land-based wind
          debt_equity_ratio: 2.62  # 2024 ATB uses 72.4% debt for land-based wind
          property_tax_and_insurance: 0.03  # percent of CAPEX estimated based on https://www.nlr.gov/docs/fy25osti/91775.pdf https://www.house.mn.gov/hrd/issinfo/clsrates.aspx
          total_income_tax_rate: 0.257  # 0.257 tax rate in 2024 atb baseline workbook, value here is based on federal (21%) and state in MN (9.8)
          capital_gains_tax_rate: 0.15  # H2FAST default
          sales_tax_rate: 0.07375  # total state and local sales tax in St. Louis County https://taxmaps.state.mn.us/salestax/
          debt_interest_rate: 0.07  # based on 2024 ATB nominal interest rate for land-based wind
          debt_type: Revolving debt  # can be "Revolving debt" or "One time loan". Revolving debt is H2FAST default and leads to much lower LCOH
          loan_period_if_used: 0  # H2FAST default, not used for revolving debt
          cash_onhand_months: 1  # H2FAST default
          admin_expense: 0.00  # percent of sales H2FAST default
        capital_items:
          depr_type: MACRS # can be "MACRS" or "Straight line"
          depr_period: 5  # 5  years - for clean energy facilities as specified by the IRS MACRS schedule https://www.irs.gov/publications/p946#en_US_2020_publink1000107507
          refurb: [0.]
  finance_subgroups:
    renewables:
      commodity: electricity
      commodity_stream: wind
      finance_groups: [profast_lco]
      technologies: [wind]
    natural_gas:
      commodity: electricity
      commodity_stream: natural_gas_plant
      finance_groups: [profast_lco]
      technologies: [natural_gas_plant, ng_feedstock]
    electricity:
      commodity: electricity
      commodity_stream: elec_combiner
      finance_groups: [profast_lco]
      technologies: [wind, battery, natural_gas_plant, ng_feedstock]
    hydrogen:
      commodity: hydrogen
      commodity_stream: h2_combiner
      finance_groups: [profast_lco]
      technologies: [wind, battery, natural_gas_plant, ng_feedstock, electrolyzer, h2_storage]
  cost_adjustment_parameters:
    cost_year_adjustment_inflation: 0.025  # used to adjust modeled costs to target_dollar_year
    target_dollar_year: 2022
