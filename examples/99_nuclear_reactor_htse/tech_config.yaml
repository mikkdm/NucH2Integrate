name: technology_config
description: This is a nuclear plant generating electricity and can also provide heat
general:
  folder_output: nuclear_htse
technologies:
  nuclear:
    performance_model:
      model: NuclearwithThermal
    cost_model:
      model: NuclearwithThermalCost
    model_inputs:
      performance_parameters:
        operating_mode: heat
        hourly_power_production: 500  # MW
        high_pressure_electrical_efficiency: 0.12
        low_pressure_electrical_efficiency: 0.22
        minimum_heat_extract: 1  # MW
      cost_parameters:
        nuclear_reactor_rated_capacity: 5000000.0
        nuclear_reactor_upfront_cost: 5750.0
        nuclear_reactor_fixed_om_cost: 2.64
        nuclear_reactor_variable_om_cost: 0.0145
        # Values from Table 38, Meta-Analysis of Advanced Nuclear Reactor Cost Estimations,
        # slightly adjusted away from 93% capacity factor
      shared_parameters:
        rated_capacity: 1000000.0
  htse:
    performance_model:
      model: HTSEPerformanceModel
    cost_model:
      model: HTSECostModel
    model_inputs:
      performance_parameters:
        nominal_heat_required: 6.4  # kWh/kg
        nominal_electricity_required: 36.8  # kWh/kg
        cluster_rating_MW: 1  # Electric-only sizing component
        n_clusters: 25
        turndown_ratio: 0.1  # minimum operating power
      cost_parameters:
        unit_capex: 1295  # $/kW
        fixed_capex: 0.0
  electrical_load_demand:
    performance_model:
      model: GenericDemandComponent
    model_inputs:
      performance_parameters:
        commodity: electricity
        commodity_rate_units: kW
        demand_profile: 100000  # 100 MW
  grid_sell:
    performance_model:
      model: GridPerformanceModel
    cost_model:
      model: GridCostModel
    model_inputs:
      shared_parameters:
        interconnection_size: 5000000  # 5 GW
      cost_parameters:
        cost_year: 2022
        electricity_sell_price: 0.0  # $/kWh - only selling, no buying
        interconnection_capex_per_kw: 0.0  # $/kW capital cost
        interconnection_opex_per_kw: 0.0  # $/kW/year O&M cost
        fixed_interconnection_cost: 0.0  # $ one-time fixed cost
