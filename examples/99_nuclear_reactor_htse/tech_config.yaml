name: "technology_config"
description: "This is a nuclear plant generating electricity and can also provide heat"
general: 
  folder_output: nuclear_htse
technologies:
  nuclear:
    performance_model:
      model: "NuclearwithThermal"
    cost_model:
      model: "NuclearwithThermalCost"
    model_inputs:
      performance_parameters:
        operating_mode: heat
        hourly_power_production: 500 # MW
        high_pressure_electrical_efficiency: 0.12
        low_pressure_electrical_efficiency: 0.22
        nuclear_reactor_capacity: 1000.0 # MWe

        
      cost_parameters:
        nuclear_reactor_rated_capacity: 5000000.0
        nuclear_reactor_upfront_cost: 5750.0
        nuclear_reactor_fixed_om_cost: 2.64
        nuclear_reactor_variable_om_cost: 0.0145
        #Values from Table 38, Meta-Analysis of Advanced Nuclear Reactor Cost Estimations, 
        #slightly adjusted away from 93% capacity factor
  htse:
    performance_model:
      model: "HTSEPerformanceModel"
    cost_model:
      model: "HTSECostModel"
    model_inputs:
      performance_parameters:
        nominal_heat_required: 6.4 #kWh/kg
        nominal_electricity_required: 36.8 #kWh/kg
        cluster_rating_MW: 1 #Electric-only sizing component
        n_clusters: 25
        turndown_ratio: 0.1 #minimum operating power

      cost_parameters:
        unit_capex: 1295 # $/kW
        fixed_capex: 
  
  h2_storage:
    performance_model:
      model: StorageAutoSizingModel
    control_strategy:
      model: PassThroughOpenLoopController
    cost_model:
      model: LinedRockCavernStorageCostModel
    model_inputs:
      shared_parameters:
        commodity: hydrogen
        commodity_rate_units: kg/h 
 
  combiner: 
    performance_model:
      model: "combiner_performance"
    dispatch_rule_set:
      model: "pyomo_dispatch_generic_converter"
    model_inputs:
      performance_parameters:
        commodity: "hydrogen"
        commodity_units: "kg/h"
      dispatch_rule_parameters:
        commodity_name: "hydrogen"
        commodity_storage_units: "kg/h"
      